name: Batuka Bhairava Intelligence Engine

on:
  workflow_dispatch:
    inputs:
      market:
        description: "Market (IN / US / UK / SG)"
        default: "IN"
        required: true
      run_type:
        description: "Run type (MORNING / BTST / CLOSING / WEEKEND)"
        default: "BTST"
        required: true

  schedule:
    - cron: '0 4 * * 1-5'
    - cron: '30 9 * * 1-5'
    - cron: '20 10 * * 1-5'
    - cron: '30 12 * * 6'
    - cron: '30 21 * * 1-5'
    - cron: '45 16 * * 1-5'

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect market and run type
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.market }}" ]; then
            echo "market=${{ github.event.inputs.market }}" >> $GITHUB_OUTPUT
            echo "run_type=${{ github.event.inputs.run_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)
            if [ "$DOW" -ge "6" ]; then
              echo "market=IN" >> $GITHUB_OUTPUT
              echo "run_type=WEEKEND" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "21" ]; then
              echo "market=US" >> $GITHUB_OUTPUT
              echo "run_type=BTST" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "16" ]; then
              echo "market=UK" >> $GITHUB_OUTPUT
              echo "run_type=BTST" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "04" ]; then
              echo "market=IN" >> $GITHUB_OUTPUT
              echo "run_type=MORNING" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "09" ]; then
              echo "market=IN" >> $GITHUB_OUTPUT
              echo "run_type=BTST" >> $GITHUB_OUTPUT
            else
              echo "market=IN" >> $GITHUB_OUTPUT
              echo "run_type=CLOSING" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Batuka Engine
        env:
          MARKET:           ${{ steps.detect.outputs.market }}
          RUN_TYPE:         ${{ steps.detect.outputs.run_type }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BTST_CAPITAL:     ${{ secrets.BTST_CAPITAL || '5000' }}
        run: |
          echo "Market: $MARKET | RunType: $RUN_TYPE"
          python -m batuka_bhairav.run_engine

      - name: Commit dashboard JSON
        run: |
          git config user.name  "Batuka Bot"
          git config user.email "bot@batuka.ai"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add docs/data/
          git diff --staged --quiet || git commit -m "dashboard: ${{ steps.detect.outputs.market }} [${{ steps.detect.outputs.run_type }}] [skip ci]"
          git push

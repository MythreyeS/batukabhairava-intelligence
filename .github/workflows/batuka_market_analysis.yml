name: Batuka Multi-Market Analysis

on:
  # Scheduled runs
  schedule:
    # Morning briefing - 9:00 AM IST (3:30 AM UTC) Mon-Fri
    - cron: '30 3 * * 1-5'
    # Evening BTST - 3:45 PM IST (10:15 AM UTC) Mon-Fri
    - cron: '15 10 * * 1-5'
    # Weekend recap - Friday 4:00 PM IST (10:30 AM UTC)
    - cron: '30 10 * * 5'
  
  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type'
        required: true
        default: 'BTST'
        type: choice
        options:
          - MORNING
          - BTST
          - CLOSING
          - WEEKEND

jobs:
  batuka-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Batuka Multi-Market Analysis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MARKET: IN
        run: |
          echo "🚀 Starting Batuka Multi-Market Analysis..."
          python run_all_markets.py
      
      - name: Upload results as artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: batuka-analysis-${{ github.run_id }}
          path: output_*.json
          retention-days: 30
      
      - name: Generate summary
        if: success()
        run: |
          echo "## ✅ Batuka Analysis Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Markets processed: IN, US, UK, SG" >> $GITHUB_STEP_SUMMARY
          echo "Telegrams sent: 4" >> $GITHUB_STEP_SUMMARY
          echo "Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY
          
          if [ -f output_consolidated.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Output Files:" >> $GITHUB_STEP_SUMMARY
            ls -lh output_*.json | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Batuka analysis failed. Check the workflow run for details.'
            })